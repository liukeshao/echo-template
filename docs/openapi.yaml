# Echo Template API OpenAPI 3.1 规范
# 
# 这个文件定义了Echo Template应用的API接口规范
# 
# 使用说明：
# 1. 按照OpenAPI 3.1规范格式添加新的API接口
# 2. 服务器地址和文档标题会从配置文件中动态更新
# 3. 修改此文件后，重启应用即可生效
# 4. 可以使用在线工具验证YAML语法：https://editor.swagger.io/
#
# 参考文档：
# - OpenAPI 3.1规范：https://spec.openapis.org/oas/v3.1.0
# - Stoplight Elements：https://github.com/stoplightio/elements
#

openapi: 3.1.0
info:
  title: Echo Template API Documentation
  description: 基于Echo框架的高性能Web应用API文档
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8000
    description: 开发服务器

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户管理相关接口

paths:
  /api/v1/auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 创建新用户账户
      operationId: registerUser
      requestBody:
        required: true
        description: 用户注册信息
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 用户身份验证
      operationId: loginUser
      requestBody:
        required: true
        description: 用户登录凭据
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  schemas:
    RegisterInput:
      type: object
      title: 用户注册输入
      description: 用户注册所需的信息
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          description: 用户名，用于登录和显示
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          examples:
            - john_doe
            - user123
        email:
          type: string
          format: email
          description: 用户邮箱地址，用于登录和通知
          examples:
            - user@example.com
            - john@company.co
        password:
          type: string
          description: 用户密码，至少8位字符
          minLength: 8
          maxLength: 128
          examples:
            - SecurePass123!
      additionalProperties: false

    LoginInput:
      type: object
      title: 用户登录输入
      description: 用户登录所需的凭据
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 注册时使用的邮箱地址
          examples:
            - user@example.com
        password:
          type: string
          description: 用户密码
          examples:
            - SecurePass123!
      additionalProperties: false

    UserInfo:
      type: object
      title: 用户信息
      description: 用户的基本信息
      properties:
        id:
          type: string
          description: 用户唯一标识符
          examples:
            - 123e4567-e89b-12d3-a456-426614174000
        username:
          type: string
          description: 用户名
          examples:
            - john_doe
        email:
          type: string
          format: email
          description: 用户邮箱
          examples:
            - user@example.com
        status:
          type: string
          description: 用户状态
          enum:
            - active
            - inactive
            - pending
          examples:
            - active
        last_login_at:
          type: string
          format: date-time
          description: 最后登录时间
          examples:
            - '2024-01-01T12:00:00Z'
        created_at:
          type: string
          format: date-time
          description: 账户创建时间
          examples:
            - '2024-01-01T12:00:00Z'
      additionalProperties: false

    AuthResponse:
      type: object
      title: 认证响应
      description: 用户认证成功后的响应数据
      properties:
        code:
          type: integer
          description: 响应状态码
          examples:
            - 200
        message:
          type: string
          description: 响应消息
          examples:
            - 操作成功
        data:
          type: object
          description: 响应数据
          properties:
            user:
              $ref: '#/components/schemas/UserInfo'
            access_token:
              type: string
              description: 访问令牌
              examples:
                - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            refresh_token:
              type: string
              description: 刷新令牌
              examples:
                - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            expires_at:
              type: integer
              description: 令牌过期时间戳
              examples:
                - 1704067200
        timestamp:
          type: integer
          description: 响应时间戳
          examples:
            - 1704067200
        request_id:
          type: string
          description: 请求ID，用于追踪
          examples:
            - abc123-def456-ghi789
        success:
          type: boolean
          description: 操作是否成功
          examples:
            - true
      additionalProperties: false

    ErrorResponse:
      type: object
      title: 错误响应
      description: API错误时的响应格式
      properties:
        code:
          type: integer
          description: 错误状态码
          examples:
            - 400
            - 401
            - 404
            - 500
        message:
          type: string
          description: 错误消息
          examples:
            - 请求参数无效
            - 未授权访问
        data:
          nullable: true
          description: 错误详细数据
        timestamp:
          type: integer
          description: 错误时间戳
          examples:
            - 1704067200
        request_id:
          type: string
          description: 请求ID
          examples:
            - abc123-def456-ghi789
        success:
          type: boolean
          const: false
          examples:
            - false
      additionalProperties: false

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation_error:
              summary: 验证错误示例
              value:
                code: 400
                message: 请求参数验证失败
                data: null
                timestamp: 1704067200
                request_id: abc123-def456-ghi789
                success: false

    Unauthorized:
      description: 未授权访问
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            auth_failed:
              summary: 认证失败示例
              value:
                code: 401
                message: 用户名或密码错误
                data: null
                timestamp: 1704067200
                request_id: abc123-def456-ghi789
                success: false

    Conflict:
      description: 资源冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            email_exists:
              summary: 邮箱已存在
              value:
                code: 409
                message: 该邮箱已被注册
                data: null
                timestamp: 1704067200
                request_id: abc123-def456-ghi789
                success: false

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT访问令牌认证 