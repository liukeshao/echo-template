# Echo Template API OpenAPI 3.1 规范
# 
# 这个文件定义了Echo Template应用的API接口规范
# 
# 使用说明：
# 1. 按照OpenAPI 3.1规范格式添加新的API接口
# 2. 服务器地址和文档标题会从配置文件中动态更新
# 3. 修改此文件后，重启应用即可生效
# 4. 可以使用在线工具验证YAML语法：https://editor.swagger.io/
#
# 参考文档：
# - OpenAPI 3.1规范：https://spec.openapis.org/oas/v3.1.0
# - Stoplight Elements：https://github.com/stoplightio/elements
#

openapi: 3.1.0
info:
  title: Echo Template API Documentation
  description: 基于Echo框架的高性能Web应用API文档
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8000
    description: 开发服务器

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户管理相关接口
  - name: 示例
    description: 示例接口
  - name: 文档
    description: API文档相关接口

paths:
  # 认证相关路径
  /api/v1/auth/register:
    $ref: './paths/auth.yaml#/register'
  /api/v1/auth/login:
    $ref: './paths/auth.yaml#/login'
  /api/v1/auth/refresh:
    $ref: './paths/auth.yaml#/refresh'
  /api/v1/auth/logout:
    $ref: './paths/auth.yaml#/logout'

  # 示例相关路径
  /api/v1/success:
    $ref: './paths/examples.yaml#/success'
  /api/v1/business-error:
    $ref: './paths/examples.yaml#/business-error'
  /api/v1/validation-error:
    $ref: './paths/examples.yaml#/validation-error'
  /api/v1/http-error:
    $ref: './paths/examples.yaml#/http-error'
  /api/v1/unknown-error:
    $ref: './paths/examples.yaml#/unknown-error'

  # 文档相关路径
  /openapi.json:
    $ref: './paths/docs.yaml#/openapi-json'
  /docs:
    $ref: './paths/docs.yaml#/docs'
  /docs/{path}:
    $ref: './paths/docs.yaml#/docs-path'

components:
  schemas:
    # 通用响应结构
    Response:
      $ref: './schemas/common.yaml#/Response'
    ErrorDetail:
      $ref: './schemas/common.yaml#/ErrorDetail'
    
    # 认证相关schemas
    RegisterInput:
      $ref: './schemas/auth.yaml#/RegisterInput'
    LoginInput:
      $ref: './schemas/auth.yaml#/LoginInput'
    RefreshTokenInput:
      $ref: './schemas/auth.yaml#/RefreshTokenInput'
    AuthData:
      $ref: './schemas/auth.yaml#/AuthData'
    UserInfo:
      $ref: './schemas/auth.yaml#/UserInfo'

  responses: {}

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT访问令牌认证 