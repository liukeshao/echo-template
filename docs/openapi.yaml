# Echo Template API OpenAPI 3.1 规范
# 
# 这个文件定义了Echo Template应用的API接口规范
# 
# 使用说明：
# 1. 按照OpenAPI 3.1规范格式添加新的API接口
# 2. 服务器地址和文档标题会从配置文件中动态更新
# 3. 修改此文件后，重启应用即可生效
# 4. 可以使用在线工具验证YAML语法：https://editor.swagger.io/
#
# 参考文档：
# - OpenAPI 3.1规范：https://spec.openapis.org/oas/v3.1.0
# - Stoplight Elements：https://github.com/stoplightio/elements
#

openapi: 3.1.0
info:
  title: Echo Template API Documentation
  description: 基于Echo框架的高性能Web应用API文档
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8000
    description: 开发服务器

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户管理相关接口
  - name: 示例
    description: 示例接口

paths:
  /api/v1/auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 创建新用户账户
      operationId: registerUser
      requestBody:
        required: true
        description: 用户注册信息
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: 统一响应格式 (业务状态码在response.code中)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
              examples:
                success:
                  summary: 注册成功
                  value:
                    code: 0
                    message: "注册成功"
                    data:
                      user:
                        id: "123e4567-e89b-12d3-a456-426614174000"
                        username: "john_doe"
                        email: "user@example.com"
                        status: "active"
                        created_at: "2024-01-01T12:00:00Z"
                      access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      expires_at: 1704067200
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"
                validation_error:
                  summary: 验证失败
                  value:
                    code: 10422
                    message: "请求参数验证失败"
                    data: null
                    errors:
                      - location: "body.email"
                        message: "邮箱格式无效"
                        value: "invalid-email"
                      - location: "body.password"
                        message: "密码长度至少8位"
                        value: "123"
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"
                conflict_error:
                  summary: 邮箱已存在
                  value:
                    code: 10409
                    message: "该邮箱已被注册"
                    data: null
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"

  /api/v1/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 用户身份验证
      operationId: loginUser
      requestBody:
        required: true
        description: 用户登录凭据
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: 统一响应格式 (业务状态码在response.code中)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
              examples:
                success:
                  summary: 登录成功
                  value:
                    code: 0
                    message: "登录成功"
                    data:
                      user:
                        id: "123e4567-e89b-12d3-a456-426614174000"
                        username: "john_doe"
                        email: "user@example.com"
                        status: "active"
                        last_login_at: "2024-01-01T12:00:00Z"
                        created_at: "2024-01-01T12:00:00Z"
                      access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      expires_at: 1704067200
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"
                auth_failed:
                  summary: 认证失败
                  value:
                    code: 10401
                    message: "用户名或密码错误"
                    data: null
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"

  /api/v1/auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新访问令牌
      description: 使用refresh_token刷新access_token
      operationId: refreshToken
      requestBody:
        required: true
        description: 刷新令牌请求体
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenInput'
      responses:
        '200':
          description: 统一响应格式 (业务状态码在response.code中)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
              examples:
                success:
                  summary: 刷新成功
                  value:
                    code: 0
                    message: "令牌刷新成功"
                    data:
                      access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      expires_at: 1704067200
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"
                invalid:
                  summary: 刷新失败
                  value:
                    code: 10401
                    message: "refresh_token无效或已过期"
                    data: null
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"

  /api/v1/auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      description: 撤销当前access_token，需要Bearer认证
      operationId: logoutUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 统一响应格式 (业务状态码在response.code中)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
              examples:
                success:
                  summary: 登出成功
                  value:
                    code: 0
                    message: "登出成功"
                    data: null
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"
                unauthorized:
                  summary: 未登录
                  value:
                    code: 10401
                    message: "用户未登录"
                    data: null
                    timestamp: 1704067200
                    request_id: "abc123-def456-ghi789"

  /api/v1/success:
    get:
      tags:
        - 示例
      summary: 成功响应示例
      description: 返回一个成功的示例数据
      operationId: exampleSuccess
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'

  /api/v1/business-error:
    get:
      tags:
        - 示例
      summary: 业务错误响应示例
      description: 返回一个业务错误示例
      operationId: exampleBusinessError
      responses:
        '200':
          description: 业务错误响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'

  /api/v1/validation-error:
    post:
      tags:
        - 示例
      summary: 验证错误响应示例
      description: 返回一个验证错误示例
      operationId: exampleValidationError
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 验证错误响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'

  /api/v1/http-error:
    get:
      tags:
        - 示例
      summary: HTTP错误响应示例
      description: 返回一个HTTP错误响应
      operationId: exampleHTTPError
      responses:
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/unknown-error:
    get:
      tags:
        - 示例
      summary: 未知错误响应示例
      description: 返回一个未知错误（panic）
      operationId: exampleUnknownError
      responses:
        '200':
          description: 未知错误响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'

  /openapi.json:
    get:
      tags:
        - 文档
      summary: 获取OpenAPI规范
      description: 返回当前API的OpenAPI 3.1规范（JSON格式）
      operationId: getOpenAPISpec
      responses:
        '200':
          description: OpenAPI规范JSON
          content:
            application/json:
              schema:
                type: object

  /docs:
    get:
      tags:
        - 文档
      summary: API文档页面
      description: 返回可交互的API文档页面（HTML）
      operationId: getDocsPage
      responses:
        '200':
          description: 文档页面
          content:
            text/html:
              schema:
                type: string
  /docs/{path}:
    get:
      tags:
        - 文档
      summary: API文档页面（子路径）
      description: 返回可交互的API文档页面（HTML）
      operationId: getDocsSubPage
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文档页面
          content:
            text/html:
              schema:
                type: string

components:
  schemas:
    RegisterInput:
      type: object
      title: 用户注册输入
      description: 用户注册所需的信息
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          description: 用户名，用于登录和显示
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
          examples:
            - john_doe
            - user123
        email:
          type: string
          format: email
          description: 用户邮箱地址，用于登录和通知
          examples:
            - user@example.com
            - john@company.co
        password:
          type: string
          description: 用户密码，至少8位字符
          minLength: 8
          maxLength: 128
          examples:
            - SecurePass123!
      additionalProperties: false

    LoginInput:
      type: object
      title: 用户登录输入
      description: 用户登录所需的凭据
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 注册时使用的邮箱地址
          examples:
            - user@example.com
        password:
          type: string
          description: 用户密码
          examples:
            - SecurePass123!
      additionalProperties: false

    UserInfo:
      type: object
      title: 用户信息
      description: 用户的基本信息
      properties:
        id:
          type: string
          description: 用户唯一标识符
          examples:
            - 123e4567-e89b-12d3-a456-426614174000
        username:
          type: string
          description: 用户名
          examples:
            - john_doe
        email:
          type: string
          format: email
          description: 用户邮箱
          examples:
            - user@example.com
        status:
          type: string
          description: 用户状态
          enum:
            - active
            - inactive
            - pending
          examples:
            - active
        last_login_at:
          type: string
          format: date-time
          description: 最后登录时间
          examples:
            - '2024-01-01T12:00:00Z'
        created_at:
          type: string
          format: date-time
          description: 账户创建时间
          examples:
            - '2024-01-01T12:00:00Z'
      additionalProperties: false

    ErrorDetail:
      type: object
      title: 错误详情
      description: 特定错误的详细信息，用于验证错误等场景
      properties:
        message:
          type: string
          description: 人类可读的错误说明
          examples:
            - "邮箱格式无效"
            - "密码长度至少8位"
        location:
          type: string
          description: 错误发生的位置路径，通常以body、query、header或path开头
          examples:
            - "body.email"
            - "body.password"
            - "query.page"
            - "path.user-id"
        value:
          description: 发生错误的字段值，用于调试
          examples:
            - "invalid-email"
            - "123"
            - null
      additionalProperties: false

    AuthData:
      type: object
      title: 认证数据
      description: 用户认证成功后返回的数据
      properties:
        user:
          $ref: '#/components/schemas/UserInfo'
        access_token:
          type: string
          description: 访问令牌
          examples:
            - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        refresh_token:
          type: string
          description: 刷新令牌
          examples:
            - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        expires_at:
          type: integer
          description: 令牌过期时间戳
          examples:
            - 1704067200
      additionalProperties: false

    UnifiedResponse:
      type: object
      title: 统一响应格式
      description: 所有API的统一响应格式，HTTP状态码统一为200，API状态码在code字段中
      required:
        - code
        - message
        - timestamp
      properties:
        code:
          type: integer
          description: API状态码 (0=成功, 1xxxx=客户端错误, 2xxxx=服务器错误, 3xxxx=业务错误)
          examples:
            - 0
            - 10400
            - 10401
            - 10404
            - 10422
            - 20500
        message:
          type: string
          description: 响应消息
          examples:
            - "操作成功"
            - "请求参数验证失败"
            - "用户名或密码错误"
        data:
          description: 响应数据，成功时包含实际数据，失败时为null
          oneOf:
            - $ref: '#/components/schemas/AuthData'
            - type: object
            - type: "null"
        errors:
          type: array
          description: 错误详情列表，仅在验证错误等场景下存在
          items:
            $ref: '#/components/schemas/ErrorDetail'
          examples:
            - []
            - [
                {
                  "location": "body.email",
                  "message": "邮箱格式无效",
                  "value": "invalid-email"
                }
              ]
        timestamp:
          type: integer
          description: 响应时间戳
          examples:
            - 1704067200
        request_id:
          type: string
          description: 请求ID，用于追踪和调试
          examples:
            - "abc123-def456-ghi789"
      additionalProperties: false

    RefreshTokenInput:
      type: object
      title: 刷新令牌输入
      description: 用于刷新access_token的请求体
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: 刷新令牌
          examples:
            - 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
      additionalProperties: false

  responses: {}

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT访问令牌认证 