# 通用Schema定义
# 包含错误详情和统一响应格式等通用数据结构

ErrorDetail:
  type: object
  title: 错误详情
  description: 特定错误的详细信息，用于验证错误等场景
  properties:
    message:
      type: string
      description: 人类可读的错误说明
      examples:
        - "邮箱格式无效"
        - "密码长度至少8位"
    location:
      type: string
      description: 错误发生的位置路径，通常以body、query、header或path开头
      examples:
        - "body.email"
        - "body.password"
        - "query.page"
        - "path.user-id"
    value:
      description: 发生错误的字段值，用于调试
      examples:
        - "invalid-email"
        - "123"
        - null
  additionalProperties: false

Response:
  type: object
  title: 统一响应格式
  description: 所有API的统一响应格式，HTTP状态码统一为200，API状态码在code字段中
  required:
    - code
    - message
    - timestamp
  properties:
    code:
      type: integer
      description: API状态码 (0=成功, 1xxxx=客户端错误, 2xxxx=服务器错误, 3xxxx=业务错误)
      examples:
        - 0
        - 10400
        - 10401
        - 10404
        - 10422
        - 20500
    message:
      type: string
      description: 响应消息
      examples:
        - "操作成功"
        - "请求参数验证失败"
        - "用户名或密码错误"
    data:
      description: 响应数据，成功时包含实际数据，失败时为null
      oneOf:
        - $ref: './auth.yaml#/AuthData'
        - type: object
        - type: "null"
    errors:
      type: array
      description: 错误详情列表，仅在验证错误等场景下存在
      items:
        $ref: '#/ErrorDetail'
      examples:
        - []
        - [
            {
              "location": "body.email",
              "message": "邮箱格式无效",
              "value": "invalid-email"
            }
          ]
    timestamp:
      type: integer
      description: 响应时间戳
      examples:
        - 1704067200
    request_id:
      type: string
      description: 请求ID，用于追踪和调试
      examples:
        - "abc123-def456-ghi789"
  additionalProperties: false 