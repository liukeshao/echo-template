# 认证相关API路径定义
# 对应 auth_handler.go 中的接口

register:
  post:
    tags:
      - 认证
    summary: 用户注册
    description: 创建新用户账户
    operationId: registerUser
    requestBody:
      required: true
      description: 用户注册信息
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RegisterInput'
    responses:
      '200':
        description: 统一响应格式 (业务状态码在response.code中)
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'
            examples:
              success:
                summary: 注册成功
                value:
                  code: 0
                  message: "注册成功"
                  data:
                    user:
                      id: "123e4567-e89b-12d3-a456-426614174000"
                      username: "john_doe"
                      email: "user@example.com"
                      status: "active"
                      created_at: "2024-01-01T12:00:00Z"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_at: 1704067200
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"
              validation_error:
                summary: 验证失败
                value:
                  code: 10422
                  message: "请求参数验证失败"
                  data: null
                  errors:
                    - location: "body.email"
                      message: "邮箱格式无效"
                      value: "invalid-email"
                    - location: "body.password"
                      message: "密码长度至少8位"
                      value: "123"
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"
              conflict_error:
                summary: 邮箱已存在
                value:
                  code: 10409
                  message: "该邮箱已被注册"
                  data: null
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"

login:
  post:
    tags:
      - 认证
    summary: 用户登录
    description: 用户身份验证
    operationId: loginUser
    requestBody:
      required: true
      description: 用户登录凭据
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/LoginInput'
    responses:
      '200':
        description: 统一响应格式 (业务状态码在response.code中)
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'
            examples:
              success:
                summary: 登录成功
                value:
                  code: 0
                  message: "登录成功"
                  data:
                    user:
                      id: "123e4567-e89b-12d3-a456-426614174000"
                      username: "john_doe"
                      email: "user@example.com"
                      status: "active"
                      last_login_at: "2024-01-01T12:00:00Z"
                      created_at: "2024-01-01T12:00:00Z"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_at: 1704067200
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"
              auth_failed:
                summary: 认证失败
                value:
                  code: 10401
                  message: "用户名或密码错误"
                  data: null
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"

refresh:
  post:
    tags:
      - 认证
    summary: 刷新访问令牌
    description: 使用refresh_token刷新access_token
    operationId: refreshToken
    requestBody:
      required: true
      description: 刷新令牌请求体
      content:
        application/json:
          schema:
            $ref: '../schemas/auth.yaml#/RefreshTokenInput'
    responses:
      '200':
        description: 统一响应格式 (业务状态码在response.code中)
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'
            examples:
              success:
                summary: 刷新成功
                value:
                  code: 0
                  message: "令牌刷新成功"
                  data:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_at: 1704067200
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"
              invalid:
                summary: 刷新失败
                value:
                  code: 10401
                  message: "refresh_token无效或已过期"
                  data: null
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"

logout:
  post:
    tags:
      - 认证
    summary: 用户登出
    description: 撤销当前access_token，需要Bearer认证
    operationId: logoutUser
    security:
      - BearerAuth: []
    responses:
      '200':
        description: 统一响应格式 (业务状态码在response.code中)
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'
            examples:
              success:
                summary: 登出成功
                value:
                  code: 0
                  message: "登出成功"
                  data: null
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789"
              unauthorized:
                summary: 未登录
                value:
                  code: 10401
                  message: "用户未登录"
                  data: null
                  timestamp: 1704067200
                  request_id: "abc123-def456-ghi789" 