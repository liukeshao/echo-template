# 示例相关API路径定义
# 对应 example_handler.go 中的接口

success:
  get:
    tags:
      - 示例
    summary: 成功响应示例
    description: 返回一个成功的示例数据
    operationId: exampleSuccess
    responses:
      '200':
        description: 成功响应
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'

business-error:
  get:
    tags:
      - 示例
    summary: 业务错误响应示例
    description: 返回一个业务错误示例
    operationId: exampleBusinessError
    responses:
      '200':
        description: 业务错误响应
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'

validation-error:
  post:
    tags:
      - 示例
    summary: 验证错误响应示例
    description: 返回一个验证错误示例
    operationId: exampleValidationError
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
    responses:
      '200':
        description: 验证错误响应
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response'

http-error:
  get:
    tags:
      - 示例
    summary: HTTP错误响应示例
    description: 返回一个HTTP错误响应
    operationId: exampleHTTPError
    responses:
      '400':
        description: 请求参数无效
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string

unknown-error:
  get:
    tags:
      - 示例
    summary: 未知错误响应示例
    description: 返回一个未知错误（panic）
    operationId: exampleUnknownError
    responses:
      '200':
        description: 未知错误响应
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/Response' 