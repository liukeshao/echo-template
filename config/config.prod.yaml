http:
  hostname: ""
  port: 8000
  readTimeout: "5s"
  writeTimeout: "10s"
  idleTimeout: "2m"
  shutdownTimeout: "10s"

app:
  name: "echo-template"
  host: "https://yourdomain.com"  # 生产环境域名
  environment: "prod"
  encryptionKey: "YOUR_PRODUCTION_ENCRYPTION_KEY_CHANGE_THIS"  # 生产环境加密密钥
  timeout: "20s"
  # API文档配置 - 生产环境禁用
  docs:
    enabled: false  # 生产环境禁用文档
    path: "/docs"
    title: "Echo Template API Documentation"

database:
  driver: "sqlite3"
  connection: "dbs/production.db?_journal=WAL&_timeout=5000&_fk=true"
  testConnection: "file:/$RAND?vfs=memdb&_timeout=1000&_fk=true" 